name: Build Junior Data

on:
  repository_dispatch:
    types: [scrape-complete]
  workflow_dispatch:
  schedule:
    - cron: '0 13 * * 3'

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests beautifulsoup4

      - name: Run safe junior Zone data builder
        run: python build_junior_zone_data_fixed.py --patch-app

      - name: Commit and push updated data files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/junior-data.js junior-results/main.js
          git diff --staged --quiet || git commit -m "data: rebuild junior-data.js $(date -u '+%Y-%m-%d %H:%M UTC')"
          git push
