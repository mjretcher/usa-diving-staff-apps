<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Junior Circuit — USA Diving Staff Platform</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@600;700;800&family=Inter:ital,opsz,wght@0,14..32,300..900;1,14..32,300..900&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../shared/design.css">
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>

    <!-- ── TOP BAR ─────────────────────────────────────────────── -->
    <header class="app-topbar">

      <!-- Brand / home link -->
      <a class="topbar-brand" href="../index.html" title="Back to Staff Platform">
        <div class="brand-mark">
          <svg class="brand-mark-squiggle" viewBox="0 0 18 18">
            <path d="M9 2 C9 2 13 5 13 9 C13 13 9 16 9 16" stroke-width="2.2"/>
            <path d="M5 5 C5 5 8 7 8 9 C8 11 6 13 6 13" stroke-width="1.6" opacity=".6"/>
            <circle cx="13" cy="4" r="1.8" fill="white" stroke="none"/>
          </svg>
        </div>
        <div class="brand-text">
          <div class="brand-org">USA Diving</div>
          <div class="brand-subtitle">Staff Platform</div>
        </div>
      </a>

      <!-- Stage navigation -->
      <nav class="stage-nav" id="stageNav" aria-label="Circuit stage"></nav>

      <!-- Actions -->
      <div class="topbar-actions">
        <button class="topbar-btn" id="overrideToggle" aria-pressed="false">
          <svg width="12" height="12" viewBox="0 0 12 12" fill="none">
            <path d="M1 3h10M3 6h6M5 9h2" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
          </svg>
          Overrides
          <span class="override-badge" id="overrideBadge" hidden>0</span>
        </button>
        <button class="topbar-btn primary" id="exportBtn">
          <svg width="12" height="12" viewBox="0 0 12 12" fill="none">
            <path d="M6 1v7M6 8L4 6M6 8l2-2M2 10h8" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
          Export
        </button>
      </div>
    </header>

    <!-- ── OVERRIDE DRAWER ─────────────────────────────────────── -->
    <aside class="override-drawer" id="overrideDrawer" hidden>
      <div class="drawer-header">
        <div>
          <h2>Manual Overrides</h2>
          <p>Saved in this browser. Can be undone.</p>
        </div>
        <div class="drawer-header-actions">
          <button class="btn-ghost btn-sm" id="undoOverrideButton">Undo</button>
          <button class="btn-ghost btn-sm" id="redoOverrideButton">Redo</button>
          <button class="btn-ghost btn-sm" id="exportOverridesButton">Export JSON</button>
          <button class="btn-ghost btn-sm btn-danger" id="clearOverridesButton">Clear all</button>
        </div>
      </div>
      <div class="drawer-form">
        <label class="form-field"><span>Athlete ID</span><input id="overrideAthleteId" type="text" placeholder="DiveMeets ID"></label>
        <label class="form-field"><span>Name</span><input id="overrideAthleteName" type="text" placeholder="Optional — for reference"></label>
        <label class="form-field">
          <span>Override type</span>
          <select id="overrideType">
            <option value="foreign">Foreign athlete</option>
            <option value="dual">Dual citizen</option>
            <option value="dualEffect">Dual affects results</option>
            <option value="hps">HPS athlete</option>
            <option value="ymca">YMCA event champion</option>
            <option value="notAttending">Declared not attending</option>
          </select>
        </label>
        <label class="form-field">
          <span>State</span>
          <select id="overrideValue"><option value="true">Turn on</option><option value="false">Turn off</option></select>
        </label>
        <label class="form-field form-field-wide"><span>Note</span><input id="overrideNote" type="text" placeholder="Reason or source"></label>
        <button class="btn-primary" id="addOverrideButton">Add override</button>
      </div>
      <div class="drawer-summary" id="overrideSummary"></div>
      <div class="drawer-log" id="overrideLog"></div>
    </aside>

    <!-- ── BODY ────────────────────────────────────────────────── -->
    <div class="app-body">

      <!-- SIDEBAR -->
      <aside class="control-sidebar" aria-label="Filters">
        <div class="sidebar-section" id="filterFields"></div>
        <div class="sidebar-section">
          <div class="sidebar-section-title">Filter by flag</div>
          <div class="filter-flags" id="filterFlags"></div>
        </div>
      </aside>

      <!-- MAIN -->
      <main class="main-workspace">
        <div class="stage-content" id="stageContent">
          <div class="kpi-row" id="kpiRow"></div>
          <div class="workspace">
            <aside class="event-panel">
              <div class="panel-head">
                <span class="panel-head-title">Events</span>
                <button class="btn-link" id="clearEventButton">All</button>
              </div>
              <div class="event-search-wrap">
                <input class="event-search" id="eventSearch" type="search" placeholder="Filter events…">
              </div>
              <div class="event-list" id="eventList"></div>
            </aside>
            <div class="results-panel">
              <div class="results-context" id="resultsContext"></div>
              <div class="results-toolbar">
                <div class="view-tabs" id="viewTabs" role="tablist"></div>
                <div class="toolbar-actions">
                  <span class="row-count" id="rowCount"></span>
                  <button class="btn-sm" id="copyTsvButton">Copy TSV</button>
                  <button class="btn-sm" id="downloadCsvButton">Download CSV</button>
                </div>
              </div>
              <div class="table-wrap" id="tableWrap"></div>
            </div>
          </div>
        </div>
      </main>
    </div>

    <script src="overrides-sync.js"></script>
    <script src="../data/junior-data.js"></script>
    <script src="../data/junior-athlete-status.js"></script>
    <script src="zone-rule-normalize.js"></script>
    <script src="status-merge.js"></script>
    <script src="main.js"></script>
    <script src="dashboard-controls.js"></script>
    <script src="qualification-impact.js"></script>
    <script src="qualification-workbench.js"></script>
  </body>
</html>
